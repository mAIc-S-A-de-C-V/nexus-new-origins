version: "3.9"

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "50m"
    max-file: "5"
    labels: "service"
    tag: "{{.Name}}"


services:
  # ─── Frontend ───────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_CONNECTOR_SERVICE_URL: ${VITE_CONNECTOR_SERVICE_URL:-http://localhost:8001}
        VITE_PIPELINE_SERVICE_URL: ${VITE_PIPELINE_SERVICE_URL:-http://localhost:8002}
        VITE_INFERENCE_SERVICE_URL: ${VITE_INFERENCE_SERVICE_URL:-http://localhost:8003}
        VITE_ONTOLOGY_SERVICE_URL: ${VITE_ONTOLOGY_SERVICE_URL:-http://localhost:8004}
        VITE_EVENT_LOG_SERVICE_URL: ${VITE_EVENT_LOG_SERVICE_URL:-http://localhost:8005}
        VITE_AUDIT_SERVICE_URL: ${VITE_AUDIT_SERVICE_URL:-http://localhost:8006}
        VITE_CORRELATION_ENGINE_URL: ${VITE_CORRELATION_ENGINE_URL:-http://localhost:8008}
        VITE_PROCESS_ENGINE_URL: ${VITE_PROCESS_ENGINE_URL:-http://localhost:8009}
        VITE_ALERT_ENGINE_URL: ${VITE_ALERT_ENGINE_URL:-http://localhost:8010}
        VITE_AUTH_SERVICE_URL: ${VITE_AUTH_SERVICE_URL:-http://localhost:8011}
        VITE_PROJECT_MGMT_URL: ${VITE_PROJECT_MGMT_URL:-http://localhost:9000}
        VITE_FINANCE_SERVICE_URL: ${VITE_FINANCE_SERVICE_URL:-http://localhost:9001}
        VITE_LOGIC_SERVICE_URL: ${VITE_LOGIC_SERVICE_URL:-http://localhost:8012}
        VITE_AGENT_SERVICE_URL: ${VITE_AGENT_SERVICE_URL:-http://localhost:8013}
        VITE_UTILITY_SERVICE_URL: ${VITE_UTILITY_SERVICE_URL:-http://localhost:8014}
        VITE_ANALYTICS_SERVICE_URL: ${VITE_ANALYTICS_SERVICE_URL:-http://localhost:8015}
        VITE_EVAL_SERVICE_URL: ${VITE_EVAL_SERVICE_URL:-http://localhost:8016}
        VITE_LINEAGE_SERVICE_URL: ${VITE_LINEAGE_SERVICE_URL:-http://localhost:8017}
        VITE_SEARCH_SERVICE_URL: ${VITE_SEARCH_SERVICE_URL:-http://localhost:8018}
        VITE_DATA_QUALITY_SERVICE_URL: ${VITE_DATA_QUALITY_SERVICE_URL:-http://localhost:8019}
        VITE_COLLABORATION_SERVICE_URL: ${VITE_COLLABORATION_SERVICE_URL:-http://localhost:8020}
        VITE_API_GATEWAY_URL: ${VITE_API_GATEWAY_URL:-http://localhost:8021}
        VITE_ADMIN_SERVICE_URL: ${VITE_ADMIN_SERVICE_URL:-http://localhost:8022}
        VITE_KERNEL_SERVICE_URL: ${VITE_KERNEL_SERVICE_URL:-http://localhost:8026}
    ports:
      - "3000:3000"
    mem_limit: 384m
    depends_on:
      - connector-service
      - ontology-service
      - project-management-service
      - finance-service
      - auth-service
    networks:
      - nexus-net

  # ─── Backend Services ────────────────────────────────────────────────────────
  connector-service:
    build:
      context: ./backend/connector_service
      dockerfile: Dockerfile
    ports:
      - "8001:8001"
    mem_limit: 512m
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - REDIS_URL=redis://redis:6379/0
      - TENANT_ID=tenant-001
      - EVENT_LOG_SERVICE_URL=http://event-log-service:8005
      - AUTH_SERVICE_URL=http://auth-service:8011
      - WHATSAPP_SERVICE_URL=http://whatsapp-service:8025
      - SKIP_AUTH=${SKIP_AUTH:-true}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8001 --reload
    logging: *default-logging

  pipeline-service:
    build:
      context: ./backend
      dockerfile: pipeline_service/Dockerfile
    ports:
      - "8002:8002"
    mem_limit: 1g
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - REDIS_URL=redis://redis:6379/0
      - ONTOLOGY_SERVICE_URL=http://ontology-service:8004
      - EVENT_LOG_SERVICE_URL=http://event-log-service:8005
      - WHATSAPP_SERVICE_URL=http://whatsapp-service:8025
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ADMIN_SERVICE_URL=http://admin-service:8022
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8002 --reload
    logging: *default-logging

  inference-service:
    build:
      context: ./backend
      dockerfile: inference_service/Dockerfile
    ports:
      - "8003:8003"
    mem_limit: 512m
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ADMIN_SERVICE_URL=http://admin-service:8022
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8003 --reload

  ontology-service:
    build:
      context: ./backend
      dockerfile: ontology_service/Dockerfile
    ports:
      - "8004:8004"
    mem_limit: 1g
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - TIMESCALE_URL=postgresql+asyncpg://nexus:nexus_pass@timescaledb:5432/nexus_events
      - REDIS_URL=redis://redis:6379/4
      - QUERY_CACHE_TTL_SECONDS=60
      - QUERY_CACHE_ROLLUP_TTL_SECONDS=3600
      - AGGREGATE_AUTO_INDEX=true
      - AGGREGATE_SLOW_THRESHOLD_MS=500
      - ROLLUP_PROMOTE_THRESHOLD=20
      - ROLLUP_PROMOTE_WINDOW_SECONDS=600
      - ROLLUP_REFRESH_INTERVAL_SECONDS=120
      - CONNECTOR_SERVICE_URL=http://connector-service:8001
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8004 --reload
    logging: *default-logging

  event-log-service:
    build:
      context: ./backend
      dockerfile: event_log_service/Dockerfile
    ports:
      - "8005:8005"
    mem_limit: 384m
    environment:
      - TIMESCALE_URL=postgresql+asyncpg://nexus:nexus_pass@timescaledb:5432/nexus_events
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      timescaledb:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8005 --reload

  audit-service:
    build:
      context: ./backend
      dockerfile: audit_service/Dockerfile
    ports:
      - "8006:8006"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8006 --reload
    logging: *default-logging

  schema-registry:
    build:
      context: ./backend/schema_registry
      dockerfile: Dockerfile
    ports:
      - "8007:8007"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8007 --reload

  correlation-engine:
    build:
      context: ./backend
      dockerfile: correlation_engine/Dockerfile
    ports:
      - "8008:8008"
    mem_limit: 384m
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8008 --reload

  process-engine-service:
    build:
      context: ./backend/process_engine
      dockerfile: Dockerfile
    ports:
      - "8009:8009"
    mem_limit: 384m
    environment:
      - TIMESCALE_URL=postgresql+asyncpg://nexus:nexus_pass@timescaledb:5432/nexus_events
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8009 --reload

  auth-service:
    build:
      context: ./backend/auth_service
      dockerfile: Dockerfile
    ports:
      - "8011:8011"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - JWT_ISSUER=https://nexus.internal/auth
      - APP_BASE_URL=${APP_BASE_URL:-http://localhost:3000}
      - SKIP_AUTH=false
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID:-}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET:-}
      - OKTA_CLIENT_ID=${OKTA_CLIENT_ID:-}
      - OKTA_CLIENT_SECRET=${OKTA_CLIENT_SECRET:-}
      - OKTA_BASE_URL=${OKTA_BASE_URL:-}
      - AZURE_CLIENT_ID=${AZURE_CLIENT_ID:-}
      - AZURE_CLIENT_SECRET=${AZURE_CLIENT_SECRET:-}
      - AZURE_TENANT_ID=${AZURE_TENANT_ID:-common}
      - AUDIT_SERVICE_URL=http://audit-service:8006
      - AUTH_SERVICE_URL=http://auth-service:8011
      - COOKIE_SECURE=false
      - JWT_PRIVATE_KEY_PEM=${JWT_PRIVATE_KEY_PEM:-}
      - ADMIN_SEED_PASSWORD=${ADMIN_SEED_PASSWORD:-NexusSuperAdmin2026!}
      - MJSP_ADMIN_PASSWORD=${MJSP_ADMIN_PASSWORD:-}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8011 --reload
    logging: *default-logging

  logic-service:
    build:
      context: ./backend/logic_service
      dockerfile: Dockerfile
    ports:
      - "8012:8012"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - ONTOLOGY_SERVICE_URL=http://ontology-service:8004
      - UTILITY_SERVICE_URL=http://utility-service:8014
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ADMIN_SERVICE_URL=http://admin-service:8022
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASSWORD=${SMTP_PASSWORD:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8012 --reload
    logging: *default-logging

  agent-service:
    build:
      context: ./backend
      dockerfile: agent_service/Dockerfile
    ports:
      - "8013:8013"
    mem_limit: 512m
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - ONTOLOGY_SERVICE_URL=http://ontology-service:8004
      - LOGIC_SERVICE_URL=http://logic-service:8012
      - UTILITY_SERVICE_URL=http://utility-service:8014
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ADMIN_SERVICE_URL=http://admin-service:8022
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      logic-service:
        condition: service_started
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8013 --reload
    logging: *default-logging

  utility-service:
    build:
      context: ./backend/utility_service
      dockerfile: Dockerfile
    ports:
      - "8014:8014"
    mem_limit: 384m
    environment:
      - AUTH_SERVICE_URL=http://auth-service:8011
      - SKIP_AUTH=${SKIP_AUTH:-true}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8014 --reload

  alert-engine-service:
    build:
      context: ./backend/alert_engine
      dockerfile: Dockerfile
    ports:
      - "8010:8010"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - TIMESCALE_URL=postgresql+asyncpg://nexus:nexus_pass@timescaledb:5432/nexus_events
      - AUTH_SERVICE_URL=http://auth-service:8011
      - SKIP_AUTH=${SKIP_AUTH:-true}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8010 --reload

  analytics-service:
    build:
      context: ./backend
      dockerfile: analytics_service/Dockerfile
    ports:
      - "8015:8015"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ADMIN_SERVICE_URL=http://admin-service:8022
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
      - SKIP_AUTH=${SKIP_AUTH:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8015 --reload

  eval-service:
    build:
      context: ./backend
      dockerfile: eval_service/Dockerfile
    ports:
      - "8016:8016"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ADMIN_SERVICE_URL=http://admin-service:8022
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
      - SKIP_AUTH=${SKIP_AUTH:-true}
      - AGENT_SERVICE_URL=http://agent-service:8013
      - LOGIC_SERVICE_URL=http://logic-service:8012
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8016 --reload

  search-service:
    build:
      context: ./backend
      dockerfile: search_service/Dockerfile
    ports:
      - "8018:8018"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql://nexus:nexus_pass@postgres:5432/nexus
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
      - SKIP_AUTH=${SKIP_AUTH:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8018 --reload

  data-quality-service:
    build:
      context: ./backend
      dockerfile: data_quality_service/Dockerfile
    ports:
      - "8019:8019"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql://nexus:nexus_pass@postgres:5432/nexus
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
      - SKIP_AUTH=${SKIP_AUTH:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8019 --reload

  collaboration-service:
    build:
      context: ./backend
      dockerfile: collaboration_service/Dockerfile
    ports:
      - "8020:8020"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql://nexus:nexus_pass@postgres:5432/nexus
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
      - SKIP_AUTH=${SKIP_AUTH:-true}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8020 --reload

  api-gateway-service:
    build:
      context: ./backend
      dockerfile: api_gateway_service/Dockerfile
    ports:
      - "8021:8021"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql://nexus:nexus_pass@postgres:5432/nexus
      - REDIS_URL=redis://redis:6379/3
      - EVENT_LOG_URL=http://event-log-service:8005
      - API_PUBLIC_URL=${API_PUBLIC_URL:-http://localhost:8021}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
      - SKIP_AUTH=${SKIP_AUTH:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8021 --reload

  admin-service:
    build:
      context: ./backend
      dockerfile: admin_service/Dockerfile
    ports:
      - "8022:8022"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql://nexus:nexus_pass@postgres:5432/nexus
      - AUTH_SERVICE_URL=http://auth-service:8011
      - EVENT_LOG_URL=http://event-log-service:8005
      - SKIP_AUTH=${SKIP_AUTH:-false}
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8022 --reload

  # ─── Sepsis Test Dataset Service (isolated, no DB) ──────────────────────────
  sepsis-service:
    build:
      context: ./backend/sepsis_service
      dockerfile: Dockerfile
    ports:
      - "8023:8023"
    mem_limit: 384m
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    volumes:
      - sepsis-data:/app/data
    networks:
      - nexus-net

  lineage-service:
    build:
      context: ./backend
      dockerfile: lineage_service/Dockerfile
    ports:
      - "8017:8017"
    mem_limit: 384m
    environment:
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
      - SKIP_AUTH=${SKIP_AUTH:-true}
      - CONNECTOR_SERVICE_URL=http://connector-service:8001
      - PIPELINE_SERVICE_URL=http://pipeline-service:8002
      - ONTOLOGY_SERVICE_URL=http://ontology-service:8004
      - LOGIC_SERVICE_URL=http://logic-service:8012
      - AGENT_SERVICE_URL=http://agent-service:8013
    depends_on:
      - connector-service
      - ontology-service
      - agent-service
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8017 --reload

  # ─── Nexus Apps ─────────────────────────────────────────────────────────────
  project-management-service:
    build:
      context: ./nexus-apps/project-management-service
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - EVENT_LOG_SERVICE_URL=http://event-log-service:8005
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 9000 --reload

  finance-service:
    build:
      context: ./nexus-apps/finance-service
      dockerfile: Dockerfile
    ports:
      - "9001:9001"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql+asyncpg://nexus:nexus_pass@postgres:5432/nexus
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 9001 --reload

  # ─── Infrastructure ──────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    mem_limit: 1g
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_pass
      POSTGRES_DB: nexus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexus-net

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    ports:
      - "5434:5432"
    mem_limit: 768m
    environment:
      POSTGRES_USER: nexus
      POSTGRES_PASSWORD: nexus_pass
      POSTGRES_DB: nexus_events
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexus -d nexus_events"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nexus-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    mem_limit: 256m
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - nexus-net

  # ─── Backup ─────────────────────────────────────────────────────────────────
  backup-service:
    image: postgres:16-alpine
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - nexus_backups:/var/backups/nexus
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-nexus}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nexus_pass}
      - POSTGRES_HOST=postgres
      - TIMESCALE_HOST=timescaledb
      - BACKUP_DIR=/var/backups/nexus
      - RETENTION_DAYS=30
      - BACKUP_ENCRYPTION_KEY=${BACKUP_ENCRYPTION_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - nexus-net
    entrypoint: >
      sh -c "
        echo '0 2 * * * /backup.sh >> /var/log/backup.log 2>&1' | crontab - &&
        crond -f -l 8
      "
    restart: unless-stopped

  demo-service:
    build:
      context: ./backend/demo_service
      dockerfile: Dockerfile
    ports:
      - "8024:8024"
    mem_limit: 384m
    networks:
      - nexus-net
    command: uvicorn main:app --host 0.0.0.0 --port 8024 --reload
    logging: *default-logging

  # ─── Workbench kernel (Jupyter-style notebook execution) ────────────────────
  kernel-service:
    build:
      context: ./backend
      dockerfile: Dockerfile.kernel
    ports:
      - "8026:8026"
    mem_limit: 1g
    environment:
      - ANALYTICS_URL=http://analytics-service:8015
      - ONTOLOGY_URL=http://ontology-service:8004
      - ALLOWED_ORIGINS=http://localhost:3000,http://localhost:5173,${ALLOWED_ORIGIN_EC2:-http://localhost:3000}
      - SKIP_AUTH=${SKIP_AUTH:-true}
    depends_on:
      - analytics-service
      - ontology-service
    networks:
      - nexus-net
    logging: *default-logging

  whatsapp-service:
    build:
      context: ./backend/whatsapp_service
      dockerfile: Dockerfile
    ports:
      - "8025:8025"
    mem_limit: 384m
    environment:
      - DATABASE_URL=postgresql://nexus:nexus_pass@postgres:5432/nexus
      - PORT=8025
      - INFERENCE_SERVICE_URL=http://inference-service:8003
      - ONTOLOGY_SERVICE_URL=http://ontology-service:8004
      - CONNECTOR_SERVICE_URL=http://connector-service:8001
      - PIPELINE_SERVICE_URL=http://pipeline-service:8002
      - LOGIC_SERVICE_URL=http://logic-service:8012
      - AGENT_SERVICE_URL=http://agent-service:8013
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - nexus-net
    logging: *default-logging

volumes:
  postgres_data:
  timescale_data:
  redis_data:
  nexus_backups:
  sepsis-data:

networks:
  nexus-net:
    driver: bridge
