server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;

    # Never cache index.html so new deploys are picked up without hard refresh
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
    }

    # Vite assets are content-hashed — safe to cache aggressively
    location ~* \.(js|css|woff2?|ttf|eot|ico|svg|png|jpg|jpeg|gif)$ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass http://connector-service:8001/;
    }

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
}
