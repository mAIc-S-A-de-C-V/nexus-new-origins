# Deploy override: replaces every `build:` block in docker-compose.yml with
# `image: ghcr.io/<owner>/nexus-<service>:${IMAGE_TAG:-latest}` so EC2 can
# `docker-compose pull` instead of building anything locally.
#
# Usage on EC2:
#   docker-compose -f docker-compose.yml -f docker-compose.deploy.yml pull
#   docker-compose -f docker-compose.yml -f docker-compose.deploy.yml up -d
#
# `IMAGE_NAMESPACE` defaults to the org name in lowercase; override via env
# if your fork lives under a different owner.

x-image-namespace: &namespace ${IMAGE_NAMESPACE:-maic-s-a-de-c-v}
x-tag: &tag ${IMAGE_TAG:-latest}

services:
  frontend:
    image: ghcr.io/${IMAGE_NAMESPACE:-maic-s-a-de-c-v}/nexus-frontend:${IMAGE_TAG:-latest}
