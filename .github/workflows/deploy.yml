name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd nexus-new-origins
            git fetch origin main
            git reset --hard origin/main

            # Write root .env — read by docker-compose for build arg substitution AND runtime secrets
            printf 'ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}\nVITE_CONNECTOR_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8001\nVITE_PIPELINE_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8002\nVITE_INFERENCE_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8003\nVITE_ONTOLOGY_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8004\nVITE_EVENT_LOG_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8005\nVITE_AUDIT_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8006\nVITE_CORRELATION_ENGINE_URL=http://${{ secrets.EC2_HOST }}:8008\nVITE_PROCESS_ENGINE_URL=http://${{ secrets.EC2_HOST }}:8009\nVITE_ALERT_ENGINE_URL=http://${{ secrets.EC2_HOST }}:8010\nVITE_AUTH_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8011\nVITE_PROJECT_MGMT_URL=http://${{ secrets.EC2_HOST }}:9000\nVITE_FINANCE_SERVICE_URL=http://${{ secrets.EC2_HOST }}:9001\nVITE_LOGIC_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8012\nVITE_AGENT_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8013\nVITE_UTILITY_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8014\n' > .env

            # Write frontend/.env as well (Vite fallback during build)
            printf 'VITE_CONNECTOR_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8001\nVITE_PIPELINE_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8002\nVITE_INFERENCE_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8003\nVITE_ONTOLOGY_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8004\nVITE_EVENT_LOG_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8005\nVITE_AUDIT_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8006\nVITE_CORRELATION_ENGINE_URL=http://${{ secrets.EC2_HOST }}:8008\nVITE_PROCESS_ENGINE_URL=http://${{ secrets.EC2_HOST }}:8009\nVITE_ALERT_ENGINE_URL=http://${{ secrets.EC2_HOST }}:8010\nVITE_AUTH_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8011\nVITE_PROJECT_MGMT_URL=http://${{ secrets.EC2_HOST }}:9000\nVITE_FINANCE_SERVICE_URL=http://${{ secrets.EC2_HOST }}:9001\nVITE_LOGIC_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8012\nVITE_AGENT_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8013\nVITE_UTILITY_SERVICE_URL=http://${{ secrets.EC2_HOST }}:8014\n' > frontend/.env

            sudo DOCKER_BUILDKIT=0 docker-compose build --no-cache
            sudo DOCKER_BUILDKIT=0 docker-compose up -d --force-recreate

            # Wait and print status so failures are visible in Actions logs
            sleep 15
            sudo docker-compose ps
            echo "--- finance-service logs ---"
            sudo docker-compose logs --tail=20 finance-service
            echo "--- project-management-service logs ---"
            sudo docker-compose logs --tail=20 project-management-service
